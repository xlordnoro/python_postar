name: Build python_postar Release ZIPs v2

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14.2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo

      - name: Build GUI with PyInstaller
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --windowed --add-data "../css;css" --add-data "../translations/*.qm;translations" --add-data "../qt_translations;qt_translations" --icon=../icon.ico gui.pyw -n python_postar_gui

      - name: Build Updater GUI with PyInstaller
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --windowed --icon=../icon.ico updater.py -n updater

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path python_postar_windows\scripts
          New-Item -ItemType Directory -Force -Path python_postar_windows\css\
          New-Item -ItemType Directory -Force -Path python_postar_windows\translations\
          New-Item -ItemType Directory -Force -Path python_postar_windows\qt_translations\
          Copy-Item src\dist\python_postar_gui.exe python_postar_windows\
          Copy-Item src\dist\updater.exe python_postar_windows\
          Copy-Item src\python_postar.py python_postar_windows\
          Copy-Item src\helper.py python_postar_windows\
          Copy-Item src\gui.pyw python_postar_windows\
          Copy-Item src\updater.py python_postar_windows\
          Copy-Item -Recurse css\* python_postar_windows\css\
          Copy-Item -Recurse translations\* python_postar_windows\translations\
          Copy-Item -Recurse qt_translations\* python_postar_windows\qt_translations\
          Copy-Item icon.ico python_postar_windows\
          Copy-Item requirements.txt python_postar_windows\
          Copy-Item -Recurse guides python_postar_windows\
          Copy-Item scripts\postar_batch.bat python_postar_windows\scripts\

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path python_postar_windows\* -DestinationPath python_postar_windows_${{ github.ref_name }}.zip -Force

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python_postar_windows_${{ github.ref_name }}.zip

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 120
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
  
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo
  
      - name: Build GUI App Bundle
        shell: bash
        run: |
          cd src
          pyinstaller --clean --windowed --onedir \
            --name python_postar_gui \
            --icon ../icon_linux.png \
            --add-data "../css:css" \
            --add-data "../translations/*.qm:translations" \
            --add-data "../qt_translations:qt_translations" \
            gui.pyw
  
      - name: Build Updater App Bundle
        shell: bash
        run: |
          cd src
          pyinstaller --clean --windowed --onedir \
            --name updater \
            updater.py
  
      - name: Create macOS App Bundle Layout
        shell: bash
        run: |
          mkdir -p release
          mv src/dist/python_postar_gui/python_postar_gui.app release/
          mv src/dist/updater/updater.app release/
  
          mkdir -p release/python_postar_data
          cp src/python_postar.py release/python_postar_data/
          cp src/helper.py release/python_postar_data/
          cp -r css translations qt_translations guides scripts release/python_postar_data/
  
      - name: Create DMG Installer
        shell: bash
        run: |
          brew install create-dmg || true
  
          create-dmg \
            --volname "Python Postar" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 128 \
            --icon "python_postar_gui.app" 200 190 \
            --app-drop-link 600 185 \
            python_postar_gui_${{ github.ref_name }}.dmg \
            release/
  
      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python_postar_gui_${{ github.ref_name }}.dmg
