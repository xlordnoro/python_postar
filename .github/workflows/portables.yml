name: Build Portable Python App

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14.2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo

      # -------------------------------
      # Build Windows EXEs
      # -------------------------------
      - name: Build Python script EXE
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onedir --icon=../icon.ico python_postar.py

      - name: Build GUI EXE
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --windowed --add-data "../css;css" --add-data "../translations/*.qm;translations" --add-data "../qt_translations;qt_translations" --icon=../icon.ico gui.pyw -n python_postar_gui

      - name: Build Updater GUI EXE
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --icon=../icon.ico updater.py -n updater

      # -------------------------------
      # Prepare portable folder
      # -------------------------------
      - name: Prepare portable folder
        shell: pwsh
        run: |
          $STAGE = "src\dist\python_postar_portable"
          New-Item -ItemType Directory -Force -Path "$STAGE\scripts"
          New-Item -ItemType Directory -Force -Path "$STAGE\css"
          New-Item -ItemType Directory -Force -Path "$STAGE\translations"
          New-Item -ItemType Directory -Force -Path "$STAGE\qt_translations"
          Copy-Item -Recurse src\dist\python_postar\* "$STAGE\"
          Copy-Item src\dist\python_postar_gui.exe "$STAGE\"
          Copy-Item src\dist\updater.exe "$STAGE\"
          Copy-Item icon.ico "$STAGE\"
          Copy-Item -Recurse guides "$STAGE\"
          Copy-Item -Recurse css\* "$STAGE\css\"
          Copy-Item -Recurse translations\* "$STAGE\translations\"
          Copy-Item -Recurse qt_translations\* "$STAGE\qt_translations\"
          Copy-Item scripts\postar_batch_portable.bat "$STAGE\scripts\"

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $DIST_FOLDER = "src\dist\python_postar_portable"
          $ZIP_NAME = "python_postar_windows_${env:GITHUB_REF_NAME}_portable.zip"
          Compress-Archive -Path "$DIST_FOLDER\*" -DestinationPath $ZIP_NAME -Force
          Write-Host "Created $ZIP_NAME"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: python_postar_windows_${{ github.ref_name }}_portable.zip

  build-macos-x86_64:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14.2
  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo
  
      - name: Generate app icon
        run: |
          ICON_SRC="icon_linux.png"
          ICON_DST="src/dist/python_postar.icns"
          mkdir -p "$(dirname "$ICON_DST")"
          ICONSET_DIR="src/dist/python_postar.iconset"
          mkdir -p "$ICONSET_DIR"
          sips -z 16 16     "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64     "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128   "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256@2x.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET_DIR/icon_512x512.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o "$ICON_DST"
  
      - name: Build macOS apps
        shell: bash
        run: |
          cd src
          # GUI app as a proper .app bundle
          pyinstaller --clean --onedir --windowed --icon=dist/python_postar.icns gui.pyw -n python_postar_gui
          # CLI apps
          pyinstaller --clean --onefile python_postar.py -n python_postar
          pyinstaller --clean --onefile updater.py -n updater
  
      - name: Prepare app bundle for DMG
        run: |
          STAGE="src/dist/python_postar_dmg"
          mkdir -p "$STAGE"
  
          # Dynamically find the .app bundle (robust)
          APP_BUNDLE=$(find dist -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "Error: .app bundle not found in dist/"
            exit 1
          fi
          cp -r "$APP_BUNDLE" "$STAGE/"
  
          cp dist/python_postar "$STAGE/"
          cp dist/updater "$STAGE/"
          cp -r guides "$STAGE/"
          cp -r css "$STAGE/"
          cp -r translations "$STAGE/"
          cp -r qt_translations "$STAGE/"
  
      - name: Create DMG
        run: |
          cd src/dist
          DMG_NAME="python_postar_macos_x86_64_${GITHUB_REF_NAME}.dmg"
          hdiutil create -volname "PythonPostar" -srcfolder python_postar_dmg -ov -format UDZO "$DMG_NAME"
          echo "Created DMG: $DMG_NAME"
  
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/python_postar_macos_x86_64_${{ github.ref_name }}.dmg
  
  build-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
