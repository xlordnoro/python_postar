name: Build Windows Installer (NSIS with Full Portable Python)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14.2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo packaging

      # -------------------------------
      # Build Windows EXEs
      # -------------------------------
      - name: Build Python script EXE (onedir)
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onedir --icon=../icon.ico python_postar.py

      - name: Build GUI EXE
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --windowed `
          --add-data "../css;css" `
          --add-data "../translations/*.qm;translations" `
          --add-data "../qt_translations;qt_translations" `
          --add-data "../themes;themes" `
          --icon=../icon.ico gui.pyw -n python_postar_gui

      - name: Build Updater EXE
        shell: pwsh
        run: |
          cd src
          pyinstaller --clean --onefile --icon=../icon.ico updater.py -n updater

      # -------------------------------
      # Prepare NSIS installer folder (include _internal)
      # -------------------------------
      - name: Prepare NSIS installer folder
        shell: pwsh
        run: |
          $STAGE = "python_postar_windows"
          New-Item -ItemType Directory -Force -Path "$STAGE\scripts"
          New-Item -ItemType Directory -Force -Path "$STAGE\css"
          New-Item -ItemType Directory -Force -Path "$STAGE\translations"
          New-Item -ItemType Directory -Force -Path "$STAGE\qt_translations"
          New-Item -ItemType Directory -Force -Path "$STAGE\themes"

          # Copy _internal folder and all Python files for portable EXE
          Copy-Item -Recurse src\dist\python_postar\* "$STAGE\"

          # Copy GUI and updater EXEs
          Copy-Item src\dist\python_postar_gui.exe "$STAGE\"
          Copy-Item src\dist\updater.exe "$STAGE\"

          # Copy resources and guides
          Copy-Item icon.ico "$STAGE\"
          Copy-Item -Recurse guides "$STAGE\"
          Copy-Item -Recurse css\* "$STAGE\css\"
          Copy-Item -Recurse translations\* "$STAGE\translations\"
          Copy-Item -Recurse qt_translations\* "$STAGE\qt_translations\"
          Copy-Item -Recurse themes\* "$STAGE\themes\"
          Copy-Item scripts\postar_batch_portable.bat "$STAGE\scripts\"

      # -------------------------------
      # Install NSIS
      # -------------------------------
      - name: Install NSIS
        run: choco install nsis -y --no-progress

      # -------------------------------
      # Build NSIS Installer
      # -------------------------------
      - name: Build NSIS Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ github.ref_name }} installer/postar_installer.nsi

      - name: Verify installer
        shell: pwsh
        run: dir installer\python_postar_setup_${{ github.ref_name }}.exe

      - name: Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/python_postar_setup_${{ github.ref_name }}.exe
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
