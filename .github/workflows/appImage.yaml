name: Build Linux AppImage

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Install system packages
      # -------------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip libfuse2 fonts-noto-cjk zsync gh

      # -------------------------
      # Set release tag
      # -------------------------
      - name: Set release tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # -------------------------
      # Download Portable Python 3.14
      # -------------------------
      - name: Download and extract portable Python 3.14.3
        run: |
          wget https://github.com/astral-sh/python-build-standalone/releases/download/20260211/cpython-3.14.3+20260211-x86_64-unknown-linux-gnu-install_only.tar.gz -O python-3.14.3.tar.gz
          mkdir -p AppDir/usr
          tar --strip-components=1 -xzf python-3.14.3.tar.gz -C AppDir/usr

          AppDir/usr/bin/python3 -m ensurepip
          AppDir/usr/bin/python3 -m pip install --upgrade pip
          AppDir/usr/bin/python3 -m pip install PyQt6 PyQt6-WebEngine requests pymediainfo packaging

      # -------------------------
      # Prepare AppDir
      # -------------------------
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/fonts/truetype AppDir/usr/share/icons/hicolor/256x256/apps AppDir/usr/app
          cp src/*.py* AppDir/usr/app/
          cp -r css translations qt_translations themes AppDir/usr/app/
          cp /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc AppDir/usr/share/fonts/truetype/
          cp icon_linux.png icon.ico python_postar_gui.desktop AppDir/
          cp AppRun AppDir/
          chmod +x AppDir/AppRun

      # -------------------------
      # Precompile Python code
      # -------------------------
      - name: Precompile Python code
        run: |
          APPDIR=AppDir
          PYTHON_BIN=$APPDIR/usr/bin/python3
          mkdir -p $APPDIR/__pycache__
          $PYTHON_BIN -m compileall -b -f -d $APPDIR/__pycache__ $APPDIR/usr/app
          $PYTHON_BIN -m compileall -b -f -d $APPDIR/__pycache__ $APPDIR/usr/lib/python3.14/site-packages || true

      # -------------------------
      # Download continuous AppImageTool
      # -------------------------
      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      # -------------------------
      # Build AppImage and embed update info
      # -------------------------
      - name: Build AppImage
        run: |
          VERSION=$VERSION
          APPIMAGE_NAME="python_postar_gui-${VERSION}-x86_64.AppImage"
          APPIMAGE_DIR="python_postar_linux"
          mkdir -p "$APPIMAGE_DIR"

          ./appimagetool-x86_64.AppImage \
            -u "gh-releases-zsync|xlordnoro|python_postar|${VERSION}|${APPIMAGE_NAME}" \
            AppDir "$APPIMAGE_NAME"

          mv "$APPIMAGE_NAME" "$APPIMAGE_DIR/"

      # -------------------------
      # Debug: check embedded update info
      # -------------------------
      - name: Debug AppImage update info
        run: |
          APPIMAGE=$(ls python_postar_linux/*.AppImage)
          echo "Checking embedded update info (raw search):"
          strings "$APPIMAGE" | grep gh-releases-zsync || echo "No update info found!"

      # -------------------------
      # Generate .zsync file
      # -------------------------
      - name: Generate zsync file
        run: |
          APPIMAGE_DIR="python_postar_linux"
          APPIMAGE=$(ls "$APPIMAGE_DIR"/*.AppImage)
          APPIMAGE_URL="https://github.com/xlordnoro/python_postar/releases/download/${VERSION}/$(basename $APPIMAGE)"

          echo "Generating zsync file pointing to: $APPIMAGE_URL"
          zsyncmake -u "$APPIMAGE_URL" -o "$APPIMAGE_DIR/$(basename $APPIMAGE).zsync" "$APPIMAGE"

          ls -lh "$APPIMAGE_DIR/"

      # -------------------------
      # Upload AppImage + zsync using GitHub CLI
      # -------------------------
      - name: Upload AppImage and zsync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE_DIR="python_postar_linux"
          gh release upload "$VERSION" "$APPIMAGE_DIR"/*.AppImage "$APPIMAGE_DIR"/*.zsync --clobber
