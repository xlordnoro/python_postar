name: Build Linux AppImage

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Install Python & dependencies
      # -------------------------
      - name: Set up Python
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo

      # -------------------------
      # Build binaries with PyInstaller
      # -------------------------
      - name: Build binaries
        shell: bash
        run: |
          source venv/bin/activate
          cd src
          pyinstaller --clean --onefile --windowed \
            --add-data "../css:css" \
            --add-data "../translations/*.qm:translations" \
            --add-data "../qt_translations:qt_translations" \
            gui.pyw -n python_postar_gui
          pyinstaller --clean --onefile --windowed updater.py -n updater

      # -------------------------
      # Prepare AppDir with fonts, icon, desktop file
      # -------------------------
      - name: Prepare AppDir for AppImage
        shell: bash
        run: |
          # Install Japanese font and FUSE
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk libfuse2

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/python_postar
          mkdir -p AppDir/usr/share/fonts
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          # Copy binaries
          cp src/dist/python_postar_gui AppDir/usr/bin/
          cp src/dist/updater AppDir/usr/bin/

          # Copy Python scripts & resources
          cp src/python_postar.py AppDir/usr/share/python_postar/
          cp src/helper.py AppDir/usr/share/python_postar/
          cp src/gui.pyw AppDir/usr/share/python_postar/
          cp src/updater.py AppDir/usr/share/python_postar/
          cp -r css AppDir/usr/share/python_postar/
          cp -r translations AppDir/usr/share/python_postar/
          cp -r qt_translations AppDir/usr/share/python_postar/

          # Copy Japanese font from system
          cp /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc AppDir/usr/share/fonts/

          # Copy icon
          cp icon_linux.png AppDir/usr/share/icons/hicolor/256x256/apps/python_postar_gui.png

          # Create desktop file
          cat > AppDir/usr/share/applications/python_postar_gui.desktop <<EOL
[Desktop Entry]
Name=python_postar_gui
Comment=Python Postar GUI
Exec=python_postar_gui
Icon=python_postar_gui
Terminal=false
Type=Application
Categories=Utility;
EOL

          # Make binaries executable
          chmod +x AppDir/usr/bin/python_postar_gui
          chmod +x AppDir/usr/bin/updater

      # -------------------------
      # Download appimagetool
      # -------------------------
      - name: Download appimagetool
        shell: bash
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      # -------------------------
      # Build AppImage
      # -------------------------
      - name: Build AppImage
        shell: bash
        run: |
          ./appimagetool-x86_64.AppImage AppDir
          mkdir -p python_postar_linux
          mv python_postar_gui*.AppImage python_postar_linux/

      # -------------------------
      # Upload AppImage to GitHub Release
      # -------------------------
      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python_postar_linux/*.AppImage
