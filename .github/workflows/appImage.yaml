name: Build Linux AppImage

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv wget git squashfs-tools patchelf fonts-noto-cjk

      - name: Set up Python and build environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests pymediainfo appimage-builder

      - name: Build binaries with PyInstaller
        run: |
          source venv/bin/activate
          cd src
          pyinstaller --clean --onefile --windowed --add-data "../css:css" --add-data "../translations/*.qm:translations" --add-data "../qt_translations:qt_translations" gui.pyw -n python_postar_gui
          pyinstaller --clean --onefile --windowed updater.py -n updater

      - name: Prepare AppDir structure
        run: |
          mkdir -p python_postar.AppDir/usr/bin
          mkdir -p python_postar.AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p python_postar.AppDir/usr/share/fonts

          # Copy binaries
          cp src/dist/python_postar_gui python_postar.AppDir/usr/bin/
          cp src/dist/updater python_postar.AppDir/usr/bin/

          # Copy resources
          cp -r css translations qt_translations guides python_postar.AppDir/usr/
          cp requirements.txt python_postar.AppDir/usr/
          cp src/python_postar.py src/helper.py src/gui.pyw src/updater.py python_postar.AppDir/usr/bin/
          chmod +x python_postar.AppDir/usr/bin/*

          # Copy icon
          cp icon_linux.png python_postar.AppDir/usr/share/icons/hicolor/256x256/apps/python_postar_gui.png

          # Copy Japanese font
          cp /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc python_postar.AppDir/usr/share/fonts/

      - name: Create AppImage
        run: |
          source venv/bin/activate
          echo "version: 1" > appimage-builder.yml
          echo "AppDir: python_postar.AppDir" >> appimage-builder.yml
          echo "app: python_postar_gui" >> appimage-builder.yml
          echo "ingredients:" >> appimage-builder.yml
          echo "  script:" >> appimage-builder.yml
          echo "    - python_postar.AppDir" >> appimage-builder.yml
          python -m appimagebuilder --recipe appimage-builder.yml

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            python_postar_gui*.AppImage
